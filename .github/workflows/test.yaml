name: Test

on:
  pull_request:
  workflow_dispatch:

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    permissions:
      # See: https://github.com/golangci/golangci-lint-action#how-to-use
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Dotenv
        uses: xom9ikk/dotenv@v2
      - name: Set up go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.MANALA_GO_VERSION }}
          # See: https://github.com/golangci/golangci-lint-action/pull/704
          cache: false
      - name: Lint - GolangCI
        uses: golangci/golangci-lint-action@v9
        with:
          version: v${{ env.MANALA_GOLANGCI_LINT_VERSION }}
          # See: https://github.com/golangci/golangci-lint-action/issues/297
          args: --verbose --timeout 3m

  test:
    name: Test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Dotenv
        uses: xom9ikk/dotenv@v2
      - name: Set up go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.MANALA_GO_VERSION }}
      - name: Set up gotestsum
        run: go install gotest.tools/gotestsum@v${{ env.MANALA_GOTESTSUM_VERSION }}
      - name: Test
        env:
          GOTESTSUM_FORMAT: testdox
        run: gotestsum

  build:
    name: Build
    needs:
      - lint
      - test
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # See: https://github.com/goreleaser/goreleaser-action#workflow
          fetch-depth: 0
      - name: Dotenv
        uses: xom9ikk/dotenv@v2
      - name: Set up go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.MANALA_GO_VERSION }}
      - name: Goreleaser build
        uses: goreleaser/goreleaser-action@v7
        env:
          SDKROOT: /Library/Developer/CommandLineTools/SDKs/MacOSX.sdk
        with:
          version: v${{ env.MANALA_GORELEASER_VERSION }}
          args: >
            build --snapshot
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
          if-no-files-found: error
