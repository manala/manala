name: Docs

on:
  push:
    branches:
      - main

concurrency:
  group: docs
  cancel-in-progress: false

jobs:

  docs:
    name: Docs
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Dotenv
        uses: xom9ikk/dotenv@v2
      - name: Configure pages
        uses: actions/configure-pages@v6
      - name: Set up Zensical
        run: docker pull zensical/zensical:${{ env.MANALA_ZENSICAL_VERSION }}
      - name: Zensical build
        run: >
          docker run --rm
          --volume ${{ github.workspace }}:/docs
          zensical/zensical:${{ env.MANALA_ZENSICAL_VERSION }}
          build --clean
      - name: Upload pages artifacts
        uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - name: Deploy pages
        uses: actions/deploy-pages@v5
        id: deployment
