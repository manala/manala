services:

  ######
  # Go #
  ######

  go:
    image: golang:${MANALA_GO_VERSION}-trixie
    volumes:
      - go:/go
      - .:/usr/src/manala
    working_dir: /usr/src/manala

  ############
  # Zensical #
  ############

  zensical:
    image: zensical/zensical:${MANALA_ZENSICAL_VERSION}
    ports:
      - "8000:8000"
    volumes:
      - .:/docs
    command: serve --dev-addr 0.0.0.0:8000

  #######
  # Vhs #
  #######

  vhs:
    image: ghcr.io/charmbracelet/vhs:v${MANALA_VHS_VERSION}
    volumes:
      - go:/go
      - .:/usr/src/manala
    working_dir: /usr/src/manala

volumes:
  go:
