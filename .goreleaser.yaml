version: 2

before:
  hooks:
    - go mod download

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^typo:'
      - '^misc:'
      - Merge pull request
      - Merge branch

builds:
  - id: linux
    goos:
      - linux
    goarch:
      - amd64
      - arm64
  - id: darwin
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
  - id: windows
    goos:
      - windows
    goarch:
      - amd64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

homebrew_casks:
  - repository:
      owner: manala
      name: homebrew-tap
    commit_author:
      name: manala-bot
      email: contact@manala.io
    homepage: https://github.com/manala/manala
    description: Let your project's plumbing up to date
    generate_completions_from_executable:
      args:
        - completion
      shell_parameter_format: cobra
      shells:
        - bash
        - fish
        - pwsh
        - zsh
    hooks:
      post:
        # Prevent quarantine
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/manala"]
          end

nfpms:
  - file_name_template: "{{ .ConventionalFileName }}"
    homepage: https://github.com/manala/manala
    description: Let your project's plumbing up to date
    maintainer: Manala <contact@manala.io>
    license: MIT
    vendor: Manala
    formats:
      - deb
      - rpm
      - apk
      - archlinux
    suggests:
      - git
