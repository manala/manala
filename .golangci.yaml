version: "2"

issues:
  max-same-issues: 10

linters:
  default: all
  disable:
    - cyclop
    - depguard
    - dupword
    - err113
    - errcheck
    - errname
    - errorlint
    - exhaustruct
    - forcetypeassert
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - goconst
    - gocyclo
    - gosec
    - govet
    - interfacebloat
    - ireturn
    - lll
    - maintidx
    - mnd
    - nestif
    - nlreturn
    - noctx
    - noinlineerr
    - paralleltest
    - recvcheck
    - revive
    - staticcheck
    - testifylint
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      custom-order: true
      sections:
        - standard
        - localmodule
        - default
    gofumpt:
      extra-rules: true
