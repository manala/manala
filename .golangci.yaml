version: "2"

issues:
  max-same-issues: 10

linters:
  default: all
  disable:
    - cyclop
    - depguard
    - err113
    - exhaustruct
    - forcetypeassert
    - funlen
    - gochecknoglobals
    - gochecknoinits
    - gocognit
    - gocyclo
    - interfacebloat
    - ireturn
    - lll
    - maintidx
    - mnd
    - nestif
    - nlreturn
    - noinlineerr
    - paralleltest
    - recvcheck
    - varnamelen
    - wrapcheck
    - wsl
    - wsl_v5
  settings:
    errcheck:
      exclude-functions:
        - (*os.File).Close
        - (*github.com/fsnotify/fsnotify.Watcher).Close
        - charm.land/lipgloss/v2.Fprintln
    errorlint:
      asserts: false
      comparison: false
    goconst:
      ignore-string-values:
        - foo
        - bar
        - baz
    gosec:
      excludes:
        - G104
        - G301
        - G304
        - G306
        - G404
    govet:
      disable:
        - stdmethods
    revive:
      rules:
        - name: package-comments
          disabled: true
    testifylint:
      disable:
        - error-is-as

formatters:
  enable:
    - gci
    - gofmt
    - gofumpt
    - goimports
  settings:
    gci:
      custom-order: true
      sections:
        - standard
        - localmodule
        - default
    gofumpt:
      extra-rules: true
